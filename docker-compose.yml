version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workflow-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres123
      - DB_DATABASE=workflow_manager
      - JWT_SECRET=workflowmanager_secret_key_2025_very_secure_random_string
      - JWT_EXPIRES_IN=7d
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - workflow-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workflow-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:80"
    depends_on:
      - backend
    networks:
      - workflow-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  workflow-network:
    external: true
    name: postgres_postgres-network
